<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="SkillGuard MCP scan demo">
  <title>SkillGuard MCP scan demo</title>
  <rect width="980" height="560" rx="18" fill="#0b1020"/>
  <rect x="1" y="1" width="978" height="558" rx="18" fill="none" stroke="#334155" stroke-width="2"/>
  <circle cx="34" cy="30" r="7" fill="#ef4444"/>
  <circle cx="58" cy="30" r="7" fill="#f59e0b"/>
  <circle cx="82" cy="30" r="7" fill="#22c55e"/>
  <text x="118" y="38" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">skillguard mcp demo</text>
  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">
    <text x="36" y="92" fill="#a7f3d0">$ npx @buzzicra/skillguard scan examples/bad-mcp --preset strict</text>
    <text x="36" y="142" fill="#f8fafc">Risk: 100/100 CRITICAL</text>
    <text x="36" y="176" fill="#cbd5e1">Scanned: 1 files (0 skipped)</text>
    <text x="36" y="236" fill="#fca5a5">[HIGH] Unpinned MCP package installer</text>
    <text x="36" y="270" fill="#94a3b8">Rule: mcp-unpinned-npx (supply-chain)</text>
    <text x="36" y="304" fill="#e2e8f0">Evidence: MCP server installer uses unpinned package @evil/mcp-server</text>
    <text x="36" y="362" fill="#fca5a5">[HIGH] MCP server receives secret-like environment variable</text>
    <text x="36" y="396" fill="#94a3b8">Rule: mcp-secret-env (secrets)</text>
    <text x="36" y="454" fill="#fde68a">[MEDIUM] Remote MCP server endpoint</text>
    <text x="36" y="488" fill="#94a3b8">Rule: mcp-remote-server (network)</text>
  </g>
</svg>
